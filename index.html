<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우리의 시간</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#f2f2f7;
  --card:#fff;
  --ink:#1c1c1e;
  --sub:#3a3a3c;
  --muted:#8e8e93;
  --sep:rgba(60,60,67,.12);
  --him:#34c759;
  --him-s:rgba(52,199,89,.13);
  --him-m:rgba(52,199,89,.35);
  --her:#f2a7be;
  --her-s:rgba(242,167,190,.18);
  --her-m:rgba(242,167,190,.5);
  --both:#ff9f0a;
  --both-s:rgba(255,159,10,.15);
  --blue:#007aff;
  --r:20px;
  --rs:12px;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  min-height:100vh;
  padding-bottom:56px;
  -webkit-font-smoothing:antialiased;
}

/* PC 가운데 정렬 */
.page-wrap{
  max-width:480px;
  margin:0 auto;
}

@media(min-width:520px){
  body{ background:#e8e8ed; }
  .nb{ box-shadow:0 1px 20px rgba(0,0,0,.08); }
  .nb-inner{ max-width:480px; margin:0 auto; }
  .sheet{ max-width:480px; margin:0 auto; border-radius:16px 16px 0 0; }
}

/* ── NAVBAR ── */
.nb{
  position:sticky;top:0;z-index:60;
  background:rgba(242,242,247,.9);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:.5px solid var(--sep);
}
.nb-inner{
  display:flex;align-items:center;justify-content:space-between;
  height:52px;padding:0 20px;
}
.nb-title{
  font-family:'Noto Serif KR',serif;
  font-size:13px;font-weight:300;letter-spacing:.22em;
  color:var(--muted);text-transform:uppercase;
}
.nb-title b{
  display:block;
  font-family:'Noto Serif KR',serif;
  font-size:20px;font-weight:600;letter-spacing:.04em;
  color:var(--ink);line-height:1.1;
}
.nb-btn{
  background:none;border:none;
  font-size:15px;color:var(--blue);
  cursor:pointer;font-family:inherit;
}

/* ── COUPLE HERO ── */
.couple-hero{
  margin:16px 16px 0;
  background:var(--card);
  border-radius:var(--r);
  box-shadow:0 1px 0 var(--sep),0 4px 28px rgba(0,0,0,.06);
  overflow:hidden;
}

.couple-bg{
  background:linear-gradient(145deg,#e8fdf0 0%,#fdf0f5 55%,#fff8ec 100%);
  padding:24px 20px 20px;
}

.couple-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}

/* profile pair */
.profile-pair{
  display:flex;align-items:center;gap:0;
}

.profile-wrap{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
}

.profile-photo{
  width:60px;height:60px;border-radius:50%;
  object-fit:cover;border:3px solid white;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  transition:transform .15s;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--bg);
  overflow:hidden;
}
.profile-photo:active{transform:scale(.94);}
.profile-photo img{width:100%;height:100%;object-fit:cover;}

.profile-name{font-size:12px;font-weight:600;color:var(--sub);}

.couple-heart{
  margin:0 -2px;
  font-size:20px;
  z-index:1;
  filter:drop-shadow(0 1px 3px rgba(255,100,100,.3));
}

/* week nums */
.week-nums-row{
  display:flex;gap:16px;
}
.wn-item{}
.wn-big{
  font-size:32px;font-weight:700;
  letter-spacing:-.03em;line-height:1;
}
.wn-big.him{color:var(--him);}
.wn-big.her{color:var(--her);}
.wn-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;}
.wn-lbl{font-size:12px;font-weight:600;color:var(--sub);margin-top:5px;}

/* bars */
.couple-bars{padding:14px 20px 6px;}
.brow{display:flex;align-items:center;gap:10px;padding:5px 0;}
.brow+.brow{border-top:.5px solid var(--sep);}
.bname{font-size:13px;font-weight:500;color:var(--sub);width:34px;flex-shrink:0;}
.btrack{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
.bfill.him{background:var(--him);}
.bfill.her{background:var(--her);}
.bpct{font-size:12px;color:var(--muted);width:40px;text-align:right;}

/* together pill */
.together-pill{
  margin:10px 20px 16px;
  background:var(--both-s);
  border-radius:var(--rs);
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.tp-left{}
.tp-lbl{font-size:11px;font-weight:600;color:var(--both);letter-spacing:.04em;text-transform:uppercase;}
.tp-num{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.tp-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.tp-right{font-size:13px;color:var(--muted);}

/* this week strip */
.this-week{
  margin:0 20px 16px;
  background:rgba(0,122,255,.07);
  border-radius:var(--rs);
  padding:9px 13px;
  display:flex;justify-content:space-between;align-items:center;
}
.tw-lbl{font-size:12px;font-weight:600;color:var(--blue);}
.tw-date{font-size:12px;color:var(--muted);}

/* write btn */
.write-wrap{padding:0 16px 16px;}
.write-btn{
  width:100%;padding:14px;
  background:var(--blue);color:#fff;
  border:none;border-radius:var(--rs);
  font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;
  transition:filter .15s;
}
.write-btn:active{filter:brightness(.88);}

/* ── WEEKS GRID CARD ── */
.wg-card{
  margin:20px 16px 0;
  background:var(--card);
  border-radius:var(--r);
  box-shadow:0 1px 0 var(--sep),0 4px 24px rgba(0,0,0,.06);
  overflow:hidden;
}

.ptabs{
  display:flex;padding:8px 10px;gap:6px;
  background:var(--bg);border-bottom:.5px solid var(--sep);
}
.ptab{
  flex:1;padding:8px;border-radius:10px;
  border:1.5px solid transparent;background:transparent;
  font-family:inherit;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .18s;text-align:center;
}
.ptab.on-him{background:var(--card);color:var(--him);border-color:var(--him);box-shadow:0 1px 5px rgba(0,0,0,.1);}
.ptab.on-her{background:var(--card);color:var(--her);border-color:var(--her);box-shadow:0 1px 5px rgba(0,0,0,.1);}

.grid-inner{padding:12px 12px 4px;}

/* age band */
.age-band{display:flex;align-items:center;margin-bottom:2px;}
.age-lbl{
  width:30px;flex-shrink:0;
  font-size:10px;font-weight:700;
  color:var(--muted);text-align:right;
  padding-right:6px;letter-spacing:-.02em;
}
.age-lbl.ms{color:var(--ink);font-size:11px;}

.weeks-row{flex:1;display:flex;gap:2px;}

.wk{
  flex:1;aspect-ratio:1;border-radius:2.5px;
  cursor:pointer;transition:transform .1s;
  max-width:16px;
}
.wk:active{transform:scale(1.8);z-index:10;position:relative;}
.wk.ph {background:var(--him);opacity:.2;}
.wk.pp {background:var(--her);opacity:.2;}
.wk.fh {background:var(--him);opacity:1;}
.wk.fp {background:var(--her);opacity:1;}
.wk.fb {background:var(--both);}
.wk.cur{background:var(--both);box-shadow:0 0 0 2px var(--card),0 0 0 3.5px var(--both);}
.wk.ft {background:var(--sep);opacity:.5;}

.ms-row{
  display:flex;align-items:center;
  margin:6px 0 4px 30px;
  gap:8px;
}
.ms-line{flex:1;height:.5px;background:var(--sep);}
.ms-badge{
  font-size:10px;font-weight:700;
  color:var(--blue);letter-spacing:.04em;
  background:rgba(0,122,255,.08);
  padding:2px 10px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
}

/* legend */
.legend{
  display:flex;flex-wrap:wrap;gap:12px;
  padding:10px 12px 14px;border-top:.5px solid var(--sep);
}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500;}
.ldot{width:8px;height:8px;border-radius:2px;}

/* ── RECENT ── */
.recent-card{
  margin:20px 16px 0;
  background:var(--card);
  border-radius:var(--r);
  box-shadow:0 1px 0 var(--sep),0 4px 24px rgba(0,0,0,.06);
  overflow:hidden;
}
.recent-hdr{
  padding:13px 16px 10px;
  border-bottom:.5px solid var(--sep);
  font-size:13px;font-weight:600;
  color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
}

.erow{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px 16px;border-bottom:.5px solid var(--sep);
  cursor:pointer;transition:background .1s;
}
.erow:last-child{border-bottom:none;}
.erow:active{background:var(--bg);}

.eavatar{
  width:36px;height:36px;border-radius:50%;
  flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}
.eavatar.h{background:var(--him-s);color:var(--him);}
.eavatar.p{background:var(--her-s);color:var(--her);}
.eavatar img{width:100%;height:100%;object-fit:cover;}

.ebody{flex:1;min-width:0;}
.emeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ewho{font-size:13px;font-weight:600;color:var(--ink);}
.edate{font-size:12px;color:var(--muted);}
.etext{font-size:14px;color:var(--sub);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.echips{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.echip{font-size:11px;font-weight:600;background:var(--both-s);color:#a06000;padding:2px 8px;border-radius:20px;}

.empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;line-height:1.9;}

/* ── SHEETS ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.35);z-index:200;
}
.overlay.open{display:flex;align-items:flex-end;}

.sheet{
  background:var(--card);width:100%;
  border-radius:16px 16px 0 0;
  max-height:92vh;overflow-y:auto;
  animation:sheetUp .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:max(env(safe-area-inset-bottom),20px);
}

.sh-handle{width:36px;height:5px;background:var(--sep);border-radius:3px;margin:10px auto 0;}

.sh-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 11px;border-bottom:.5px solid var(--sep);
}
.sh-title{font-size:17px;font-weight:600;}
.sh-cancel{font-size:15px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;padding:8px 4px;min-width:44px;min-height:44px;}
.sh-done{font-size:15px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;padding:8px 4px;min-width:44px;min-height:44px;}
.sh-done:disabled{color:var(--muted);}

.sh-body{padding:18px 16px 8px;}

.fld{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}

/* segment */
.seg-ctrl{display:flex;background:var(--bg);border-radius:10px;padding:2px;margin-bottom:22px;}
.segb{flex:1;padding:8px;border-radius:8px;border:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;}
.segb.on-him{background:var(--card);color:var(--him);box-shadow:0 1px 6px rgba(0,0,0,.12);}
.segb.on-her{background:var(--card);color:var(--her);box-shadow:0 1px 6px rgba(0,0,0,.12);}

/* tags */
.tag-flow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.tagp{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--sep);background:var(--bg);
  font-family:inherit;font-size:14px;color:var(--sub);
  cursor:pointer;transition:all .15s;
}
.tagp.on{border-color:var(--both);background:var(--both-s);color:#a06000;font-weight:600;}

/* textarea */
.wta{
  width:100%;min-height:130px;
  border:1.5px solid var(--sep);background:var(--bg);
  border-radius:var(--rs);padding:13px 14px;
  font-family:inherit;font-size:16px;line-height:1.75;
  color:var(--ink);resize:none;outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
.wta:focus{border-color:var(--blue);}

/* photo + tag side by side */
.photo-tag-row{display:flex;gap:12px;margin-bottom:18px;align-items:flex-start;}

.photo-col{flex-shrink:0;}
.photo-sq{
  width:90px;height:90px;border-radius:12px;
  background:var(--bg);border:1.5px dashed var(--sep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .2s;
}
.photo-sq:active{border-color:var(--blue);}
.photo-sq-hint{font-size:11px;color:var(--muted);}

.tag-col{flex:1;min-width:0;}
.tag-chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:32px;}

.tag-inline-add{display:flex;gap:6px;}
.tag-inline-input{
  flex:1;min-width:0;
  border:1.5px solid var(--sep);background:var(--bg);
  border-radius:8px;padding:7px 10px;
  font-family:inherit;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.tag-inline-input:focus{border-color:var(--blue);}
.tag-inline-btn{
  padding:7px 10px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}

/* tag pill in write sheet */
.tagp{
  padding:5px 10px;border-radius:20px;
  border:1.5px solid var(--sep);background:var(--bg);
  font-family:inherit;font-size:12px;color:var(--sub);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.tagp.on{border-color:var(--both);background:var(--both-s);color:#a06000;font-weight:600;}
.tagp .tdel{
  font-size:11px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:0;line-height:1;margin-left:1px;
}
.tagp.on .tdel{color:#a06000;}

/* view photo */
.vphoto{
  width:100%;border-radius:var(--rs);
  overflow:hidden;margin-bottom:14px;
}
.vphoto img{width:100%;display:block;max-height:280px;object-fit:cover;}

/* recent thumbnail */
.ethumb{
  width:52px;height:52px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
}

/* search bar */
.search-bar{
  margin:14px 16px 0;
  display:flex;align-items:center;gap:10px;
  background:var(--card);
  border-radius:14px;
  padding:11px 14px;
  box-shadow:0 1px 0 var(--sep),0 2px 12px rgba(0,0,0,.05);
}
.search-icon{font-size:15px;color:var(--muted);flex-shrink:0;}
.search-input{
  flex:1;border:none;outline:none;
  font-family:inherit;font-size:15px;
  color:var(--ink);background:transparent;
}
.search-input::placeholder{color:var(--muted);}
.search-clear{
  background:none;border:none;color:var(--muted);
  font-size:16px;cursor:pointer;padding:0;
  display:none;
}

/* search results */
.search-results{
  margin:10px 16px 0;
  background:var(--card);
  border-radius:14px;
  box-shadow:0 1px 0 var(--sep),0 2px 12px rgba(0,0,0,.05);
  overflow:hidden;
  display:none;
}
.tag-mgmt{margin-bottom:18px;}
.tag-mgmt-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.tag-mgmt-item{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px 6px 12px;border-radius:20px;
  background:var(--bg);border:1.5px solid var(--sep);
  font-size:14px;color:var(--sub);
}
.tag-del{
  background:none;border:none;color:var(--muted);
  font-size:14px;cursor:pointer;padding:0 0 0 2px;
  line-height:1;
}
.tag-add-row{display:flex;gap:8px;}
.tag-add-input{
  flex:1;border:1.5px solid var(--sep);background:var(--bg);
  border-radius:var(--rs);padding:10px 12px;
  font-family:inherit;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .2s;
}
.tag-add-input:focus{border-color:var(--blue);}
.tag-add-btn{
  padding:10px 14px;background:var(--blue);color:#fff;
  border:none;border-radius:var(--rs);
  font-family:inherit;font-size:14px;font-weight:600;
  cursor:pointer;white-space:nowrap;
}

/* view sheet */
.vbadge{
  display:inline-flex;align-items:center;
  padding:5px 14px;border-radius:20px;
  font-size:13px;font-weight:700;margin-bottom:14px;
}
.vbadge.h{background:var(--him-s);color:var(--him);}
.vbadge.p{background:var(--her-s);color:var(--her);}

.vbody{
  font-size:16px;line-height:1.85;color:var(--ink);
  background:var(--bg);border-radius:var(--rs);
  padding:14px;margin-bottom:14px;white-space:pre-wrap;
}
.vchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.vchip{font-size:13px;font-weight:600;background:var(--both-s);color:#a06000;padding:5px 12px;border-radius:20px;}

.ghost-btn{
  width:100%;padding:13px;border:1.5px solid var(--sep);
  border-radius:var(--rs);background:transparent;
  font-family:inherit;font-size:15px;font-weight:500;
  color:var(--sub);cursor:pointer;margin-bottom:10px;
  transition:background .1s;
}
.ghost-btn:active{background:var(--bg);}

/* settings */
.igroup{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:18px;border:.5px solid var(--sep);}
.irow{display:flex;align-items:center;padding:0 16px;border-bottom:.5px solid var(--sep);gap:10px;}
.irow:last-child{border-bottom:none;}
.irow-lbl{font-size:15px;color:var(--ink);width:80px;flex-shrink:0;}
.irow input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--muted);padding:13px 0;background:transparent;}

/* photo upload in settings */
.photo-upload-row{
  display:flex;gap:16px;margin-bottom:22px;
}
.pu-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.pu-photo{
  width:72px;height:72px;border-radius:50%;
  background:var(--bg);border:2px dashed var(--sep);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;overflow:hidden;
  transition:border-color .2s;
}
.pu-photo:active{border-color:var(--blue);}
.pu-photo img{width:100%;height:100%;object-fit:cover;}
.pu-name{font-size:13px;font-weight:600;color:var(--sub);}
.pu-hint{font-size:11px;color:var(--muted);}
input[type=file]{display:none;}

/* ── HISTORY CALENDAR ── */
.hist-tabs{
  display:flex;background:var(--bg);border-bottom:.5px solid var(--sep);
}
.htab{
  flex:1;padding:10px 0;border:none;background:none;
  font-family:inherit;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .15s;
  border-bottom:2px solid transparent;
}
.htab.on{color:var(--blue);border-bottom-color:var(--blue);}

.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
}
.cal-month{font-size:15px;font-weight:700;color:var(--ink);}
.cal-arrow{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--bg);color:var(--blue);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.cal-grid{padding:0 12px 12px;}
.cal-dow{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:4px;
}
.cal-dow-lbl{
  text-align:center;font-size:10px;font-weight:700;
  color:var(--muted);padding:2px 0;
}
.cal-days{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;
}
.cday{
  aspect-ratio:1;border-radius:6px;border:none;background:none;
  font-family:inherit;font-size:12px;font-weight:500;
  color:var(--muted);cursor:default;

<script>
'use strict';
const TOTAL=90*52;
const today=new Date();
const DAYS=['일','월','화','수','목','금','토'];
const DEFAULT_TAGS=[];
let DTAGS=[...DEFAULT_TAGS];

// 함께한 날 시작일
const TOGETHER_DATE = new Date(2015, 7, 22); // 2015-08-22

let cfg={},entries={},curP='h',writeDate=null,viewDate=null,selWhoV='h',selTags=[],entryPhotoData=null;

const $=id=>document.getElementById(id);
const p2=n=>String(n).padStart(2,'0');
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const ds=d=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const wkLived=yr=>Math.floor((today-new Date(yr,0,1))/(7*24*60*60*1000));
const wkStart=(yr,wi)=>new Date(new Date(yr,0,1).getTime()+wi*7*24*60*60*1000);
const fmtS=d=>`${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;

function syncFromGH(){
  saveConfig();
  setTimeout(loadGH, 300);
}

function fillYearSelectors(){
  const syEl=$('sync-year'), byEl=$('backup-year');
  if(!syEl||!byEl) return;

  // 실제 기록이 있는 연도만
  const years=[...new Set(Object.keys(entries).map(k=>k.slice(0,4)))].sort((a,b)=>b-a);

  // 올해는 항상 포함
  const curYr=String(today.getFullYear());
  if(!years.includes(curYr)) years.unshift(curYr);

  syEl.innerHTML=''; byEl.innerHTML='';

  if(!years.length){
    syEl.innerHTML='<option>기록 없음</option>';
    byEl.innerHTML='<option>기록 없음</option>';
    return;
  }

  years.forEach(y=>{
    const cnt=Object.keys(entries).filter(k=>k.startsWith(y)).length;
    const label=y===curYr?`${y}년 (올해)`:y+'년';
    const sublabel=cnt>0?` · ${cnt}개`:'';
    syEl.innerHTML+=`<option value="${y}">${label}${sublabel}</option>`;
    byEl.innerHTML+=`<option value="${y}">${label}${sublabel}</option>`;
  });
}

// 연도별 동기화
async function syncByYear(){
  const yr=$('sync-year').value; if(!yr) return;
  if(!cfg.token||!cfg.user||!cfg.repo){toast('GitHub 설정을 먼저 저장해주세요');return;}
  toast(`${yr}년 기록 가져오는 중...`);
  try{
    const r=await fetch(
      `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/diary/${yr}`,
      {headers:{Authorization:`token ${cfg.token}`}}
    );
    if(!r.ok){toast(`${yr}년 기록이 없어요`);return;}
    const files=await r.json();
    const mdFiles=files.filter(f=>f.name.endsWith('.md'));

    const results=await Promise.allSettled(
      mdFiles.map(f=>fetch(f.url,{headers:{Authorization:`token ${cfg.token}`}})
        .then(r=>r.ok?r.json():null))
    );
    let count=0;
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value){
        try{
          const md=decodeURIComponent(escape(atob(r.value.content.replace(/\n/g,''))));
          parseMd(md); count++;
        }catch{}
      }
    });
    localStorage.setItem('lt-entries',JSON.stringify(entries));
    renderGrid(); renderRecent();
    if($('history-sheet').classList.contains('open')) renderHistory();
    toast(`${yr}년 ${count}개 불러왔어요 ✓`);
  }catch(e){toast('실패: '+e.message);}
}

// 백업 다운로드 (JSZip — md + 사진 포함)
async function downloadBackup(){
  const yr=$('backup-year').value;
  const mo=$('backup-month').value;
  if(!yr){toast('연도를 선택해주세요');return;}

  const keys=Object.keys(entries).filter(k=>{
    if(!k.startsWith(yr)) return false;
    if(mo&&!k.startsWith(`${yr}-${mo}`)) return false;
    return true;
  }).sort();

  if(!keys.length){toast('해당 기간 기록이 없어요');return;}

  toast('JSZip 로딩 중...');

  // JSZip CDN 로드
  await new Promise((resolve,reject)=>{
    if(window.JSZip){resolve();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });

  const zip=new JSZip();
  const label=mo?`${yr}-${mo}`:yr;
  const folder=zip.folder(`life-diary-${label}`);

  toast(`${keys.length}개 기록 묶는 중...`);

  for(const k of keys){
    const e=entries[k];
    // md 파일 추가
    folder.file(`${k}.md`, mdOf(e));

    // 사진이 GitHub URL이면 다운받아서 같이 포함
    if(e.photoUrl&&e.photoUrl.includes('raw.githubusercontent.com')){
      try{
        const res=await fetch(e.photoUrl);
        if(res.ok){
          const blob=await res.blob();
          const ext=e.photoUrl.split('.').pop().split('?')[0]||'jpg';
          folder.file(`photos/${k}.${ext}`, blob);
        }
      }catch{}
    }
  }

  toast('zip 생성 중...');
  const content=await zip.generateAsync({type:'blob',compression:'DEFLATE'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(content);
  a.download=`life-diary-${label}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`life-diary-${label}.zip 다운로드 완료 ✓`);
}

  // ── 오래된 base64 사진 청소 ──
  // cfg에 base64 사진이 있으면 제거 (URL만 유지)
  if(cfg.photoHim&&cfg.photoHim.startsWith('data:')){ delete cfg.photoHim; }
  if(cfg.photoHer&&cfg.photoHer.startsWith('data:')){ delete cfg.photoHer; }
  // 별도 키도 제거
  localStorage.removeItem('lt-photo-him');
  localStorage.removeItem('lt-photo-her');
  // entries 안에 photo base64 제거
  const cached=localStorage.getItem('lt-entries');
  if(cached){
    try{
      entries=JSON.parse(cached);

        if(entries[k].photo){ delete entries[k].photo; cleaned=true; }

  localStorage.setItem('lt-cfg', JSON.stringify(cfg));

  applyAll();

// ── GRID ──
function renderGrid(){
  const birthYear=curP==='h'?cfg.himBirth:cfg.herBirth;
  const lived=wkLived(birthYear);
  const inner=$('grid-inner'); inner.innerHTML='';

  for(let ageBlock=0;ageBlock<90;ageBlock+=5){
    // milestone separator
    if(ageBlock>0){
      const msRow=document.createElement('div'); msRow.className='ms-row';
      const line=document.createElement('div'); line.className='ms-line';
      const badge=document.createElement('span'); badge.className='ms-badge';
      const yr=birthYear+ageBlock;
      badge.textContent=`${ageBlock}세 · ${yr}년`;
      msRow.appendChild(line); msRow.appendChild(badge); msRow.appendChild(line.cloneNode());
      inner.appendChild(msRow);
    }

    for(let yr=0;yr<5;yr++){
      const age=ageBlock+yr;
      const rowStart=age*52;
      if(rowStart>=TOTAL) break;

      const band=document.createElement('div'); band.className='age-band';
      const lbl=document.createElement('div');
      lbl.className='age-lbl'+(age%5===0?' ms':'');
      lbl.textContent=age%5===0?age:'';
      band.appendChild(lbl);

      const row=document.createElement('div'); row.className='weeks-row';
      for(let w=0;w<52;w++){
        const wi=rowStart+w; if(wi>=TOTAL) break;
        const dot=document.createElement('div'); dot.className='wk';
        const isCur=wi===lived-1, isFut=wi>=lived;
        const ws=wkStart(birthYear,wi), we=addD(ws,6);
        const isTogether = ws >= TOGETHER_DATE; // 만난 날 이후
        const hasTagBoth=hasTagKw(ws,we,'같이한날');
        const hasH=hasWho(ws,we,'h'), hasP=hasWho(ws,we,'p');

        if(isCur) dot.classList.add('cur');
        else if(isFut) dot.classList.add('ft');
        else if(hasTagBoth) dot.classList.add('fb');
        else if(isTogether&&!isFut&&!isCur) dot.classList.add('fb'); // 만난 날 이후는 같이한날 색
        else if(curP==='h'&&hasH) dot.classList.add('fh');
        else if(curP==='p'&&hasP) dot.classList.add('fp');
        else dot.classList.add(curP==='h'?'ph':'pp');

        dot.title=`${age}세 ${w+1}주`;
        dot.onclick=()=>onDotClick(wi,ws,we,lived,isCur,isFut);
        row.appendChild(dot);
      }
      band.appendChild(row); inner.appendChild(band);
    }
  }
}

function hasWho(ws,we,who){
  const d=new Date(ws);
  while(d<=we){const e=entries[ds(d)];if(e&&e.who===who)return true;d.setDate(d.getDate()+1);}
  return false;
}
function hasTagKw(ws,we,kw){
  const d=new Date(ws);
  while(d<=we){const e=entries[ds(d)];if(e&&e.tags&&e.tags.some(t=>t.includes(kw)))return true;d.setDate(d.getDate()+1);}
  return false;
}

function onDotClick(wi,ws,we,lived,isCur,isFut){
  if(isFut&&!isCur) return;
  const d=new Date(ws);
  while(d<=we){const k=ds(d);if(entries[k]){openView(k);return;}d.setDate(d.getDate()+1);}
  openWrite(ds(isCur?today:ws));
}

// ── PHOTO COMPRESS ──
function compressPhoto(file, maxPx=900, quality=0.72){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w>maxPx||h>maxPx){
        if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
        else{w=Math.round(w*maxPx/h);h=maxPx;}
      }
      const c=document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.src=url;
  });
}

function openWrite(d){

  writeDate=d||ds(today); selWhoV='h'; selTags=[]; entryPhotoData=null;

  // UI 초기화 (photo-sq 구조에 맞게)
  const img=$('photo-preview-img');

  const removeBtn=$('photo-remove-btn');

  if(img){ img.src=''; img.style.display='none'; }
  if(inner) inner.style.display='flex';
  if(removeBtn) removeBtn.style.display='none';

  const dt=new Date(writeDate);
  $('wsh-ttl').textContent=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${DAYS[dt.getDay()]})`;

  const tf=$('tag-flow'); tf.innerHTML='';
  DTAGS.forEach(tag=>{
    const b=document.createElement('button'); b.className='tagp'; b.textContent=tag;
    b.onclick=()=>{
      if(selTags.includes(tag)){selTags=selTags.filter(t=>t!==tag);b.classList.remove('on');}
      else{selTags.push(tag);b.classList.add('on');}
    };
    tf.appendChild(b);
  });

  // 새 글이면 무조건 빈칸, 수정이면 기존 내용 불러오기
  const ex = isNew ? null : entries[writeDate];
  $('wta').value = ex ? ex.text : '';
  selWho(ex ? ex.who : 'h');
  if(ex){
    ex.tags.forEach(tag=>tf.querySelectorAll('.tagp').forEach(b=>{
      if(b.textContent===tag){b.classList.add('on');if(!selTags.includes(tag))selTags.push(tag);}
    }));
    if(ex.photoUrl){
      const img=$('photo-preview-img');
      const inner=$('photo-sq-inner');
      const removeBtn=$('photo-remove-btn');
      if(img){ img.src=ex.photoUrl; img.style.display='block'; }
      if(inner) inner.style.display='none';
      if(removeBtn) removeBtn.style.display='block';
    }
  }
  openSheet('write-sheet');
  setTimeout(()=>$('wta').focus(),350);
}

async function submitEntry(){
  const text=$('wta').value.trim(); if(!text){toast('내용을 입력해주세요');return;}
  const btn=$('wdone'); btn.disabled=true; btn.textContent='저장 중';

  // 기존 글 수정 시 기존 photoUrl 보존 (새 사진 없을 때)
  const existing=entries[writeDate]||{};
  let photoUrl=existing.photoUrl||null;

  // 1) 새 사진이 선택됐으면 GitHub에 업로드
  if(entryPhotoData){
    btn.textContent='사진 업로드 중...';
    const imgPath=`diary/${writeDate.slice(0,4)}/photos/${writeDate}.jpg`;
    if(cfg.token&&cfg.user&&cfg.repo){
      // 기존 sha 확인 후 업로드 (sha 불일치 방지)
      const ok=await savePhotoGH(imgPath, entryPhotoData);
      if(ok){
        photoUrl=`https://raw.githubusercontent.com/${cfg.user}/${cfg.repo}/main/${imgPath}?t=${Date.now()}`;
        toast('사진 업로드됨 ✓');
      } else {
        // 실패 시 로컬에 임시 보관 (이전 사진 덮지 않음)
        photoUrl='local:'+entryPhotoData;
        toast('⚠ 사진 GitHub 업로드 실패 → 로컬 임시저장. 설정에서 "지금 올리기" 눌러주세요.');
      }
    } else {
      photoUrl='local:'+entryPhotoData;
      toast('GitHub 미설정 → 사진 로컬 저장');
    }
  }

  // 사진 삭제 버튼으로 제거된 경우 (entryPhotoData=null & existing에도 없으면)
  // 단, 수정 시 새 사진 선택 없이 기존 photoUrl 유지하는 건 위에서 처리됨
  if(!entryPhotoData && !existing.photoUrl){
    photoUrl=null;
  }

  // 2) 글 저장 (사진 URL 포함)
  const entry={who:selWhoV,tags:[...selTags],text,date:writeDate};
  if(photoUrl) entry.photoUrl=photoUrl;

  entries[writeDate]=entry;
  localStorage.setItem('lt-entries',JSON.stringify(entries));

  // 3) UI 닫기
  btn.disabled=false; btn.textContent='저장';
  $('wta').value='';
  entryPhotoData=null;
  const ppw=$('photo-preview-wrap'); if(ppw) ppw.style.display='none';
  closeSheet('write-sheet');
  renderGrid(); renderRecent();

  // 4) GitHub에 md 저장
  if(cfg.token&&cfg.user&&cfg.repo){
    const ghOk=await saveGH(writeDate, entry);
    if(ghOk){
      toast('✓ 저장 완료 (GitHub 업로드됨)');
    } else {
      toast('⚠ 로컬 저장됨 · GitHub md 저장 실패');
    }
  } else {
    toast('저장됐어요 🌿 (로컬만)');
  }
}

    const item=document.createElement('div'); item.className='tag-mgmt-item';
    const right=cnt>0
      ? `<span style="font-size:10px;color:var(--muted);margin-left:4px;">${cnt}회 사용</span>`
      : `<button class="tag-del" onclick="deleteTag(${i})">✕</button>`;
    item.innerHTML=`<span>${tag}</span>${right}`;
    list.appendChild(item);
  });
}

function getTagUsage(){
  const usage={};
  Object.values(entries).forEach(e=>{
    (e.tags||[]).forEach(t=>{ usage[t]=(usage[t]||0)+1; });
  });
  return usage;
}

function addTag(){
  const input=$('tag-add-input');
  const val=input.value.trim(); if(!val) return;
  if(DTAGS.includes(val)){toast('이미 있는 태그예요');return;}
  DTAGS.push(val); input.value='';
  renderTagMgmt();
}

function deleteTag(i){
  const tag=DTAGS[i];
  const usage=getTagUsage();
  if(usage[tag]>0){toast(`"${tag}"은 ${usage[tag]}개 기록에서 사용 중이에요`);return;}
  DTAGS.splice(i,1);
  renderTagMgmt();
}

function onSearch(val){
  const clear=$('search-clear');
  const results=$('search-results');
  if(clear) clear.style.display=val?'block':'none';
  if(!val){ if(results) results.style.display='none'; return; }
  if(results) results.style.display='block';
  const q=val.toLowerCase();
  const keys=Object.keys(entries)
    .filter(k=>{
      const e=entries[k];
      return e.text.toLowerCase().includes(q)||
        (e.tags||[]).some(t=>t.toLowerCase().includes(q));
    })
    .sort((a,b)=>b.localeCompare(a))
    .slice(0,20);

  if(!keys.length){
    results.innerHTML='<div class="empty-msg" style="padding:20px;">검색 결과가 없어요</div>';
    return;
  }
  results.innerHTML='';
  keys.forEach(k=>{
    const e=entries[k]; const dt=new Date(k);
    const whoName=e.who==='h'?cfg.himName:cfg.herName;
    const photo=e.who==='h'?cfg.photoHim:cfg.photoHer;
    const avatarContent=photo?`<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`:(whoName[0]||'?');
    const thumb=e.photoUrl?(e.photoUrl.startsWith('local:')?e.photoUrl.slice(6):e.photoUrl):null;
    const el=document.createElement('div');
    el.className='erow'; el.onclick=()=>{ clearSearch(); openView(k); };
    // 검색어 하이라이트
    const highlighted=e.text.replace(new RegExp(`(${val})`, 'gi'),'<mark style="background:#fff176;border-radius:2px;">$1</mark>');
    el.innerHTML=`
      <div class="eavatar ${e.who}">${avatarContent}</div>
      <div class="ebody">
        <div class="emeta">
          <span class="ewho">${whoName}</span>
          <span class="edate">${dt.getFullYear()}.${p2(dt.getMonth()+1)}.${p2(dt.getDate())}</span>
        </div>
        <div class="etext">${highlighted}</div>
        ${e.tags&&e.tags.length?`<div class="echips">${e.tags.map(t=>`<span class="echip">${t}</span>`).join('')}</div>`:''}
      </div>
      ${thumb?`<img class="ethumb" src="${thumb}" alt="">`:''}
    `;
    results.appendChild(el);
  });
}

async function saveConfigGH(){
  try{
    const payload={himName:cfg.himName,herName:cfg.herName,customTags:DTAGS,photoHim:cfg.photoHim||null,photoHer:cfg.photoHer||null};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
    const url=`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/config.json`;
    let sha=null;
    const chk=await fetch(url,{headers:{Authorization:`token ${cfg.token}`}});
    if(chk.ok){const j=await chk.json();sha=j.sha;}
    const body={message:'설정 저장',content};
    if(sha) body.sha=sha;
    await fetch(url,{method:'PUT',headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  }catch{}
}

async function loadConfigGH(){
  if(!cfg.token||!cfg.user||!cfg.repo) return;
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/config.json`,
      {headers:{Authorization:`token ${cfg.token}`}});
    if(!r.ok) return;
    const j=await r.json();
    const payload=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    // 이름, 태그, 사진 적용 (로컬에 없을 때만)
    if(!cfg.himName&&payload.himName) cfg.himName=payload.himName;
    if(!cfg.herName&&payload.herName) cfg.herName=payload.herName;
    if(!cfg.customTags&&payload.customTags) cfg.customTags=payload.customTags;
    if(!cfg.photoHim&&payload.photoHim) cfg.photoHim=payload.photoHim;
    if(!cfg.photoHer&&payload.photoHer) cfg.photoHer=payload.photoHer;
    if(payload.customTags) DTAGS=payload.customTags;
    localStorage.setItem('lt-cfg',JSON.stringify(cfg));
    applyAll();
  }catch{}
}

function renderCal(){

function getPendingEntries(){
  // local: prefix가 있거나 GitHub에 아직 못 올린 글 판별은 어렵지만
  // local: 사진이 있는 항목은 확실히 미업로드

  );
}

function updatePendingBar(){
  const pending=getPendingEntries();
  const bar=$('pending-bar');
  const cnt=$('pending-count');
  if(!bar) return;
  if(pending.length>0){
    bar.style.display='block';
    if(cnt) cnt.textContent=pending.length;
  } else {
    bar.style.display='none';
  }

async function uploadPending(){
  if(!cfg.token||!cfg.user||!cfg.repo){toast('GitHub 설정을 먼저 저장해주세요');return;}
  const pending=getPendingEntries();
  if(!pending.length){toast('업로드할 항목이 없어요');return;}
  toast(`${pending.length}개 사진 업로드 중...`);
  let ok=0;
  for(const k of pending){
    const e=entries[k];
    const dataUrl=e.photoUrl.slice(6); // local: 제거
    const imgPath=`diary/${k.slice(0,4)}/photos/${k}.jpg`;
    const uploaded=await savePhotoGH(imgPath,dataUrl);
    if(uploaded){
      entries[k].photoUrl=`https://raw.githubusercontent.com/${cfg.user}/${cfg.repo}/main/${imgPath}`;
      await saveGH(k,entries[k]); // md도 URL로 업데이트
      ok++;
    }
  }
  localStorage.setItem('lt-entries',JSON.stringify(entries));
  toast(`${ok}/${pending.length}개 업로드 완료 ✓`);
  updatePendingBar();
}

function mdOf(e){
  const who=e.who==='h'?cfg.himName:cfg.herName;
  const tags=e.tags&&e.tags.length?`\ntags: [${e.tags.map(t=>`"${t}"`).join(', ')}]`:'';
  const photoLine=e.photoUrl&&!e.photoUrl.startsWith('local:')?`\n\n![사진](${e.photoUrl})`:'';
  // Obsidian 친화적 YAML frontmatter
  return `---\n날짜: ${e.date}\n작성자: ${who}${tags}\n---\n\n${e.text}${photoLine}`;
}

async function savePhotoGH(path, dataUrl){
  if(!cfg.token||!cfg.user||!cfg.repo) return false;
  try{
    const base64=dataUrl.split(',')[1];
    if(!base64){console.error('savePhotoGH: dataUrl에 base64 없음'); return false;}
    const url=`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
    let sha=null;
    const chk=await fetch(url,{headers:{Authorization:`token ${cfg.token}`}});
    if(chk.ok){const j=await chk.json();sha=j.sha;}
    const body={message:`사진: ${path.split('/').pop()}`,content:base64};
    if(sha) body.sha=sha;
    const res=await fetch(url,{method:'PUT',headers:{Authorization:`token ${cfg.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      console.error('savePhotoGH 실패:',res.status, err.message||'');
      toast(`⚠ 사진 업로드 실패 (${res.status}): ${err.message||'토큰/권한 확인'}`);
      return false;
    }
    return true;
  }catch(e){
    console.error('savePhotoGH 오류:',e);
    return false;
  }
}
async function saveGH(d,entry){
  if(!cfg.token||!cfg.user||!cfg.repo){
    toast('⚠ GitHub 설정 없음');
    return false;
  }
  const path=`diary/${d.slice(0,4)}/${d}.md`;
  const url=`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
  try{
    let sha=null;
    const chk=await fetch(url,{headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json'}});
    if(chk.ok){const j=await chk.json();sha=j.sha;}
    const body={message:`기록: ${d}`,content:btoa(unescape(encodeURIComponent(mdOf(entry))))};
    if(sha) body.sha=sha;
    const res=await fetch(url,{
      method:'PUT',
      headers:{Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({message:res.status}));
      toast(`GitHub 저장 실패: ${err.message||res.status}`);
      return false;
    }
    toast('GitHub 저장 완료 ✓');
    return true;
  }catch(e){
    toast(`GitHub 오류: ${e.message}`);
    return false;
  }
}
async function loadGH(){
  if(!cfg.token||!cfg.user||!cfg.repo) return;
  toast('동기화 중...');
  try{
    const r=await fetch(
      `https://api.github.com/repos/${cfg.user}/${cfg.repo}/git/trees/main?recursive=1`,
      {headers:{Authorization:`token ${cfg.token}`}}
    );
    if(!r.ok){ toast('GitHub 연결 실패. 토큰/레포 확인해주세요.'); return; }
    const data=await r.json();

    const files=(data.tree||[]).filter(f=>
      f.path.startsWith('diary/')&&
      f.path.endsWith('.md')
    );

    if(!files.length){
      toast('GitHub에 기록이 없어요');
      return;
    }

    toast(`${files.length}개 기록 확인 중...`);

    // 병렬 fetch (GitHub 기준으로 모두 가져와 병합)
    const results=await Promise.allSettled(
      files.map(f=>fetch(
        `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${f.path}`,
        {headers:{Authorization:`token ${cfg.token}`}}
      ).then(res=>res.ok?res.json():null))
    );

    let imported=0;
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value){
        try{
          const md=decodeURIComponent(escape(atob(r.value.content.replace(/\n/g,''))));
          const changed=parseMd(md);
          if(changed) imported++;
        }catch{}
      }
    });

    localStorage.setItem('lt-entries',JSON.stringify(entries));
    renderGrid(); renderRecent();
    if($('history-sheet').classList.contains('open')) renderHistory();
    toast(imported>0?`${imported}개 기록 업데이트됨 ✓`:'이미 최신이에요 ✓');
  }catch(e){ toast('불러오기 실패: '+e.message); }
}

// 강제 전체 동기화 (설정에서 수동으로)
async function fullSyncGH(){
  if(!cfg.token||!cfg.user||!cfg.repo) return;
  toast('전체 동기화 중...');
  entries={};
  localStorage.removeItem('lt-entries');
  await loadGH();
}
function parseMd(md){
  const dm=md.match(/날짜: (\d{4}-\d{2}-\d{2})/);
  const wm=md.match(/작성자: (.+)/);
  // 새 형식: tags: ["태그1", "태그2"] 또는 구 형식: 태그: 태그1, 태그2
  const tmNew=md.match(/^tags: \[(.+)\]/m);
  const tmOld=md.match(/^태그: (.+)/m);
  const parts=md.split(/---\n\n/);
  if(!dm) return false;
  const k=dm[1];
  const who=(wm&&wm[1].trim()===cfg.herName)?'p':'h';
  let tags=[];
  if(tmNew) tags=tmNew[1].split(',').map(t=>t.trim().replace(/^"|"$/g,''));
  else if(tmOld) tags=tmOld[1].split(',').map(t=>t.trim());
  let text=parts.length>1?parts[parts.length-1].trim():'';

  // md 이미지 문법에서 photoUrl 추출하고 텍스트에서 제거
  let photoUrl=null;
  const imgMatch=text.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);
  if(imgMatch){
    photoUrl=imgMatch[1];
    text=text.replace(/\n*!\[.*?\]\(https?:\/\/[^\)]+\)/g,'').trim();
  }

  // 기존 로컬 사진(local: prefix)은 GitHub 버전으로 덮을 때 보존
  const prev=entries[k];
  const prevPhoto=prev&&prev.photoUrl;
  const keepLocalPhoto=prevPhoto&&prevPhoto.startsWith('local:')&&!photoUrl;

  const changed=!prev||prev.text!==text||prev.who!==who;
  entries[k]={who,tags,text,date:k};
  if(photoUrl) entries[k].photoUrl=photoUrl;
  else if(keepLocalPhoto) entries[k].photoUrl=prevPhoto;
  return changed;
}

// ── TOAST ──
let toastTimer=null;
function toast(msg, type='info'){
  const t=$('toast');
  t.textContent=msg;
  t.className='toast on';
  if(msg.startsWith('✓')||msg.includes('완료')||msg.includes('됐어요')) t.style.background='#1a7a3a';
  else if(msg.startsWith('⚠')||msg.includes('실패')||msg.includes('오류')) t.style.background='#b02a00';
  else t.style.background='';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove('on');t.style.background='';},3000);
}

init();
